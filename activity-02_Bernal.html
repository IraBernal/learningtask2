<html>
	<head>
		<title> Lists </title>
	</head>

<style>

	body {
		background-color: #0B0000;
		color: #ADD8E6}

	h1 {
		font-family: "Times new roman";
		color: #E6BAAC}
	ol {
		background-color:#5C5940;
		color: #A490AC}
	ul{
		background-color:#5E4A66;
		color:  #90AC92}

</style>

	<body>
		<h1> HTML LIST </h1>
		<p>
			Ordered list is a list that is in a particular order.
		</p>
		<ol> <!-- ol means "Ordered List" -->

			<li> President </li>
			<li> Vice President </li>
			<li> Governor </li>
			<li> Vice Gorvernor </li>
			<li> Mayor </li>
			<li> Vice Mayor </li>
		</ol>

		<p>
			Ordered list is a list that is NOT in a particular order.
		</p>
		<ul> <!-- ul means "Unordered List" -->

			<li> Banana </li>
			<li> Grapes </li>
			<li> Guava </li>
			<li> Apple </li>
			<li> Strawberry </li>
		</ul>


	</body>

</html>
