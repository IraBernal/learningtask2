<html>
	<head>
		<title> Tables </title>
	</head>

<!-- tr= Table Row-->
<!--th = Table Header-->
<!-- td = Table Colum-->

<style>

	body {
		background-color: #040720;
		color: #ADD8E6}

	h1 {
		font-family: "Times new roman";
		color: #E6BAAC}

	th {font-size: 150%}

	tbody tr {
		font-size: 100%}

	tbody tr:hover {
		background-color: #545770;
		font-weight: bold}

</style>

	<body>
		<h1> TABLES </h1>
		<table border="5" cellpadding="2" cellspacing="2" width=100%>
			<thead>	
				<tr> <!-- tr= Table Row-->
					<th width="17%"> Time </th> <!--th = Table Header-->
					<th width="17%"> Monday </th>
					<th width="17%"> Tuesday </th>
					<th width="17%"> Wednesday </th>
					<th width="17%"> Thursday </th>
					<th width="17%"> Friday </th>
				</tr>
			</thead>

			<tbody>	
				<tr>
					<th width="17%" > Breakfast </th> <!-- td = Table Colum-->
					<td> Eggs </td>
					<td> Spam </td>
					<td> Eggs </td>
					<td> Eggs </td>
					<td> Bread </td>
				</tr>
				<tr>
					<th> Lunch </th>
					<td> Soup </td>
					<td> Burger </td>
					<td> Adobo </td>
					<td> Rice </td>
					<td> Bread </td>
				</tr>
			</tbody>
		</table>
		
	</body>

</html>
